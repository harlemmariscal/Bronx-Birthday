    }

      position: fixed; left: 50%; top: 35%;

      background: transparent; color: transparent; caret-color: transparent;
      font-size: 16px; pointer-events: none;
    }

</head>
<body>
<canvas id="webgl"></canvas>
<canvas id="ui"></canvas>
<input id="initialsInput" type="text" maxlength="3"
       autocomplete="off" autocapitalize="characters" autocorrect="off" spellcheck="false"
       inputmode="text">
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

const webglCanvas = document.getElementById('webgl');
const uiCanvas    = document.getElementById('ui');
const uiCtx       = uiCanvas.getContext('2d');

let W = 0, H = 0;
const renderer = new THREE.WebGLRenderer({ canvas: webglCanvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, 1, 0.1, 3000);

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  renderer.setSize(W, H, false);
  camera.aspect = W / H; camera.updateProjectionMatrix();
  uiCanvas.width = W; uiCanvas.height = H;
  buildVignette();
}
window.addEventListener('resize', resize);

// ── Scene atmosphere — DAYLIGHT ──────────────────────────────
const SKY_COLOR    = 0xa8c8e8;
const FOG_NEAR     = 80;
const FOG_FAR      = 900;
scene.background = new THREE.Color(SKY_COLOR);
scene.fog        = new THREE.Fog(SKY_COLOR, FOG_NEAR, FOG_FAR);

const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(80, 200, -60);
scene.add(sun);
scene.add(new THREE.AmbientLight(0x9ab5d0, 0.65));
scene.add(new THREE.HemisphereLight(0xc8d8e8, 0x554433, 0.55));

// ── Constants ─────────────────────────────────────────────────
const LANE_X     = [-7, 0, 7];
const LANE_TILT  = [0.06, 0, -0.06];
const SPAWN_Z    = -130;   // ~5s travel at start speed (was -800 = ~32s, way too long)
const HIT_Z      = -8;      // (still used for the generous coin-pickup window)
// obstacle death box, centered on the hero (z=0). Smaller = must be closer to die.
// Keep the span (FAR-NEAR) > ~3 so fast obstacles can't tunnel through it in one frame.
const OBS_HIT_NEAR = -1.5;  // how close ahead (z) before it kills — was effectively -8
const OBS_HIT_FAR  =  2.5;
const SWING_MS   = 380;
const STREET_W   = 24;
const BUILDING_GAP = 38;

let score    = 0;
let speed    = 25;
let playTime = 0;
let frameN   = 0;
let lastTS   = 0;
let runDist  = 0;
let camShake = 0;

const hero = {
  lane: 1, swinging: false,
  swingFrom: 1, swingTo: 1, swingT: 0,

};
let camTilt = 0;
let pendingSwipe = null;

let obstacles = [];
let coins = [];

try { hiScores = JSON.parse(localStorage.getItem('bronx-bday-scores') || '[]'); } catch(e) {}

// Native keyboard for initials
const initialsInput = document.getElementById('initialsInput');
initialsInput.addEventListener('input', () => {
  const cleaned = initialsInput.value.toUpperCase().replace(/[^A-Z]/g, '').slice(0, 3);

// ── Procedural building textures ─────────────────────────────
const BUILDING_PALETTES = [
  { base:'#5d5a6e', edge:'#3a3848', light:'#fff0c0' },
  { base:'#6a5a52', edge:'#3e362f', light:'#ffe8a0' },
  { base:'#5a6470', edge:'#363c44', light:'#fff2b0' },
  { base:'#8e7060', edge:'#5e4838', light:'#ffe0a8' },
  { base:'#4a5266', edge:'#2c3142', light:'#fff8d0' },
];

function makeBuildingTexture(palette, seed) {
  const cnv = document.createElement('canvas');
  cnv.width = 256; cnv.height = 512;
  const c = cnv.getContext('2d');
  c.fillStyle = palette.base;
  c.fillRect(0, 0, 256, 512);
  c.fillStyle = palette.edge;
  for (let y = 0; y < 512; y += 32) c.fillRect(0, y, 256, 2);
  const cols = 5;
  const rows = 14;
  const wW = 32, wH = 28;
  const padX = (256 - cols * wW) / 2;
  const padY = (512 - rows * wH) / 2;
  for (let r = 0; r < rows; r++) {
    for (let col = 0; col < cols; col++) {
      const k = ((seed * 31 + r * 11 + col * 7) % 100);
      const lit = k > 55;
      const wx = padX + col * wW + 4;
      const wy = padY + r * wH + 4;
      const ww = wW - 8, wh = wH - 8;
      c.fillStyle = '#1a1a1f';
      c.fillRect(wx - 1, wy - 1, ww + 2, wh + 2);
      c.fillStyle = lit ? palette.light : '#2c2e3a';
      c.fillRect(wx, wy, ww, wh);
      c.fillStyle = '#0e0e14';
      c.fillRect(wx + ww/2 - 1, wy, 2, wh);
      c.fillRect(wx, wy + wh/2 - 1, ww, 2);
    }
  }
  const tex = new THREE.CanvasTexture(cnv);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.RepeatWrapping;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

const buildingTextureCache = [];
function getBuildingTexture(seed) {
  const key = seed % 14;
  if (!buildingTextureCache[key]) {
    const palette = BUILDING_PALETTES[seed % BUILDING_PALETTES.length];
    buildingTextureCache[key] = makeBuildingTexture(palette, seed);
  }
  return buildingTextureCache[key];
}

// ── Street ───────────────────────────────────────────────────
function buildStreet() {
  const streetMat = new THREE.MeshStandardMaterial({ color: 0x3a3a44, roughness: 0.95 });
  const street = new THREE.Mesh(new THREE.PlaneGeometry(STREET_W, 4200), streetMat);
  street.rotation.x = -Math.PI / 2;
  street.position.z = -2000;
  street.position.y = 0;
  scene.add(street);

  const sidewalkMat = new THREE.MeshStandardMaterial({ color: 0x7a7882, roughness: 0.9 });
  for (const sx of [-1, 1]) {
    const sw = new THREE.Mesh(new THREE.PlaneGeometry(8, 4200), sidewalkMat);
    sw.rotation.x = -Math.PI / 2;
    sw.position.set(sx * (STREET_W/2 + 4), 0.05, -2000);
    scene.add(sw);
    const curb = new THREE.Mesh(
      new THREE.BoxGeometry(0.3, 0.3, 4200),
      new THREE.MeshStandardMaterial({ color: 0x4a4854 })
    );
    curb.position.set(sx * (STREET_W/2 + 0.15), 0.15, -2000);
    scene.add(curb);
  }

  const dashMat = new THREE.MeshStandardMaterial({ color: 0xfddc4f, emissive: 0x554014 });
  for (let z = 20; z > -2000; z -= 8) {   // start dashes right behind the hero so the road reads all the way down
    const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 4), dashMat);
    dash.rotation.x = -Math.PI / 2;
    dash.position.set(0, 0.06, z);
    scene.add(dash);
  }

  const laneMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, transparent:true, opacity:0.45 });
  for (const lx of [-STREET_W/4, STREET_W/4]) {
    for (let z = 20; z > -2000; z -= 12) {   // lane lines all the way to the front too
      const dash = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 5), laneMat);
      dash.rotation.x = -Math.PI / 2;
      dash.position.set(lx, 0.06, z);
      scene.add(dash);
    }
  }
}

// ── Background buildings ─────────────────────────────────────
function makeBuilding(seed, w, h, d) {
  const tex = getBuildingTexture(seed);
  const tClone = tex.clone();
  tClone.needsUpdate = true;
  tClone.wrapS = THREE.RepeatWrapping;
  tClone.wrapT = THREE.RepeatWrapping;
  tClone.repeat.set(Math.max(1, w / 8), Math.max(1, h / 12));
  const mat = new THREE.MeshStandardMaterial({ map: tClone, roughness: 0.85 });
  const topMat = new THREE.MeshStandardMaterial({ color: 0x2a2832 });
  const mats = [mat, mat, topMat, mat, mat, mat];
  return new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mats);
}

function spawnBackgroundBuilding(side, z) {
  const w = 16 + Math.random() * 16;
  const h = 40 + Math.random() * 80;
  const d = 22 + Math.random() * 14;
  const offset = side * (STREET_W/2 + 8 + w/2);
  const seed = Math.floor(Math.random() * 1000);
  const m = makeBuilding(seed, w, h, d);
  m.position.set(offset, h/2, z);
  scene.add(m);

  if (Math.random() < 0.3) {
    const tower = new THREE.Group();
    const drum = new THREE.Mesh(
      new THREE.CylinderGeometry(2.5, 2.5, 4, 12),
      new THREE.MeshStandardMaterial({ color: 0x3a2618 })
    );
    drum.position.y = 2;
    tower.add(drum);
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(2.7, 2, 12),
      new THREE.MeshStandardMaterial({ color: 0x221208 })
    );
    cone.position.y = 5;
    tower.add(cone);
    tower.position.set(offset + (Math.random() - 0.5) * (w * 0.6), h, z + (Math.random() - 0.5) * (d * 0.6));
    scene.add(tower);
  }

  if (Math.random() < 0.25) {
    const ant = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08, 0.08, 6, 6),
      new THREE.MeshStandardMaterial({ color: 0x1a1a22 })
    );
    ant.position.set(offset, h + 3, z);
    scene.add(ant);
    const light = new THREE.Mesh(
      new THREE.SphereGeometry(0.3, 8, 8),
      new THREE.MeshStandardMaterial({ color: 0xff3355, emissive: 0xff3355, emissiveIntensity: 1 })
    );
    light.position.set(offset, h + 6, z);
    scene.add(light);
  }

  backgroundBldgs.push({ mesh: m, side, baseZ: z });
  return m;
}

function populateBackgroundBuildings() {
  for (let z = -10; z > -1200; z -= BUILDING_GAP) {
    spawnBackgroundBuilding(-1, z + (Math.random() - 0.5) * 6);
    spawnBackgroundBuilding( 1, z + (Math.random() - 0.5) * 6);
  }
}

// ── Trees on sidewalks ───────────────────────────────────────
function spawnTree(side, z) {

  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.2, 0.3, 2.5, 6),
    new THREE.MeshStandardMaterial({ color: 0x4a2e1a })
  );
  trunk.position.y = 1.25;
  g.add(trunk);
  const foliage = new THREE.Mesh(
    new THREE.SphereGeometry(1.2, 8, 6),
    new THREE.MeshStandardMaterial({ color: 0x3a6a2a, roughness: 0.95 })
  );
  foliage.position.y = 3;
  g.add(foliage);
  const x = side * (STREET_W/2 + 4);
  g.position.set(x, 0, z);
  scene.add(g);
  trees.push({ mesh: g, side, baseZ: z });
}

function populateTrees() {
  for (let z = -10; z > -800; z -= 28) {
    if (Math.random() < 0.7) spawnTree(-1, z + (Math.random() - 0.5) * 4);
    if (Math.random() < 0.7) spawnTree( 1, z + (Math.random() - 0.5) * 4);
  }
}

// ── Parked cars on street ────────────────────────────────────
const CAR_COLORS = [0xff4040, 0x3b7bff, 0xffd23f, 0x2ec27e, 0xff8c1a, 0xeeeeee, 0xcc55ff, 0x18a0a8];
// reusable toy car: tapered body, tinted glass, lights, hubcapped wheels (front = +z)
function makeCarMesh(color) {
  const g = new THREE.Group();
  const bodyMat  = new THREE.MeshStandardMaterial({ color, metalness: 0.5, roughness: 0.32 });
  const glassMat = new THREE.MeshStandardMaterial({ color: 0x8fd3ff, metalness: 0.6, roughness: 0.12,
                                                    emissive: 0x113355, emissiveIntensity: 0.25 });
  const lower = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.62, 4.2), bodyMat);
  lower.position.y = 0.6; g.add(lower);
  const mid = new THREE.Mesh(new THREE.BoxGeometry(1.78, 0.5, 3.9), bodyMat);
  mid.position.y = 1.02; g.add(mid);
  const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.62, 0.66, 2.0), glassMat);
  cabin.position.set(0, 1.48, -0.15); g.add(cabin);
  const roof = new THREE.Mesh(new THREE.BoxGeometry(1.56, 0.18, 1.9), bodyMat);
  roof.position.set(0, 1.88, -0.15); g.add(roof);

  const hlMat = new THREE.MeshStandardMaterial({ color: 0xfff3c0, emissive: 0xffe070, emissiveIntensity: 0.85 });
  const tlMat = new THREE.MeshStandardMaterial({ color: 0xff3b3b, emissive: 0xff2020, emissiveIntensity: 0.7 });
  for (const lx of [-0.6, 0.6]) {
    const hl = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.24, 0.1), hlMat);
    hl.position.set(lx, 0.7, 2.12); g.add(hl);
    const tl = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.22, 0.1), tlMat);
    tl.position.set(lx, 0.7, -2.12); g.add(tl);
  }
  const tireMat = new THREE.MeshStandardMaterial({ color: 0x0e0e12, roughness: 0.85 });
  const hubMat  = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.7, roughness: 0.3 });
  for (const wx of [-0.97, 0.97]) {
    for (const wz of [-1.4, 1.4]) {
      const tire = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.42, 0.34, 14), tireMat);
      tire.rotation.z = Math.PI / 2; tire.position.set(wx, 0.42, wz); g.add(tire);
      const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.17, 0.17, 0.36, 10), hubMat);
      hub.rotation.z = Math.PI / 2; hub.position.set(wx, 0.42, wz); g.add(hub);
    }
  }
  return g;
}

function spawnCar(side, z) {
  const g = makeCarMesh(CAR_COLORS[Math.floor(Math.random() * CAR_COLORS.length)]);
  g.position.set(side * (STREET_W/2 - 1.5), 0, z);
  g.rotation.y = side === 1 ? Math.PI : 0;
  scene.add(g);
  cars.push({ mesh: g, side, baseZ: z });
}

// a car as a dodge-able obstacle — bright, facing the player (oncoming, headlights forward)
function makeCarObstacle() {
  const bright = [0xff4040, 0x3b7bff, 0xffd23f, 0x2ec27e, 0xff8c1a, 0xcc55ff];
  return makeCarMesh(bright[Math.floor(Math.random() * bright.length)]);
}

function populateCars() {
  for (let z = -10; z > -600; z -= 18) {
    if (Math.random() < 0.6) spawnCar(-1, z + (Math.random() - 0.5) * 4);
    if (Math.random() < 0.6) spawnCar( 1, z + (Math.random() - 0.5) * 4);

// ── HERO (3D Spider-hero built from primitives) ──────────────
let heroGroup, heroLegL, heroLegR, heroArmL, heroArmR, heroTorso, heroHead, heroUpper;
let webLine, webGeom, webMat;

function makeWebPatternTexture(baseColor, lineColor) {
  const cnv = document.createElement('canvas');
  cnv.width = cnv.height = 128;
  const c = cnv.getContext('2d');
  c.fillStyle = baseColor; c.fillRect(0, 0, 128, 128);
  c.strokeStyle = lineColor; c.lineWidth = 1.2;
  for (let x = 8; x < 128; x += 8) {
    c.beginPath(); c.moveTo(x, 0); c.lineTo(x, 128); c.stroke();
  }
  for (let y = 8; y < 128; y += 14) {
    c.beginPath();
    for (let x = 0; x <= 128; x += 4) {
      const yy = y + Math.sin((x / 128) * Math.PI * 2) * 2;
      if (x === 0) c.moveTo(x, yy);
      else c.lineTo(x, yy);
    }
    c.stroke();
  }
  return new THREE.CanvasTexture(cnv);
}

function makeSpiderSymbolTexture() {
  const cnv = document.createElement('canvas');
  cnv.width = cnv.height = 256;
  const c = cnv.getContext('2d');
  c.fillStyle = '#cc1818'; c.fillRect(0, 0, 256, 256);
  c.strokeStyle = 'rgba(0,0,0,0.2)'; c.lineWidth = 1;
  for (let x = 0; x < 256; x += 12) { c.beginPath(); c.moveTo(x, 0); c.lineTo(x, 256); c.stroke(); }
  for (let y = 0; y < 256; y += 14) {
    c.beginPath();
    for (let x = 0; x <= 256; x += 4) {
      const yy = y + Math.sin((x / 256) * Math.PI * 2) * 3;
      if (x === 0) c.moveTo(x, yy); else c.lineTo(x, yy);
    }
    c.stroke();
  }
  c.fillStyle = '#000';
  c.beginPath();
  c.ellipse(128, 140, 22, 36, 0, 0, Math.PI * 2);
  c.fill();
  c.beginPath();
  c.ellipse(128, 100, 16, 18, 0, 0, Math.PI * 2);
  c.fill();
  c.strokeStyle = '#000'; c.lineWidth = 8; c.lineCap = 'round';
  for (const s of [-1, 1]) {
    for (let i = 0; i < 4; i++) {
      const a = -0.5 + i * 0.4;
      const x1 = 128 + s * 20;
      const y1 = 120 + i * 10;
      const x2 = 128 + s * (20 + Math.cos(a) * 56);
      const y2 = y1 + Math.sin(a) * 56 - 10;
      c.beginPath();
      c.moveTo(x1, y1);
      c.quadraticCurveTo(128 + s * 40, y1 - 8, x2, y2);
      c.stroke();
    }
  }
  return new THREE.CanvasTexture(cnv);
}

// big black spider on a TRANSPARENT background — sits cleanly on the suit
function makeSpiderEmblemTexture() {
  const cnv = document.createElement('canvas');
  cnv.width = cnv.height = 256;
  const c = cnv.getContext('2d');
  c.clearRect(0, 0, 256, 256);
  c.fillStyle = '#0a0a0a';
  c.beginPath(); c.ellipse(128, 150, 20, 40, 0, 0, Math.PI * 2); c.fill();   // abdomen
  c.beginPath(); c.ellipse(128, 104, 15, 17, 0, 0, Math.PI * 2); c.fill();   // thorax
  c.strokeStyle = '#0a0a0a'; c.lineWidth = 7; c.lineCap = 'round';
  for (const s of [-1, 1]) {
    for (let i = 0; i < 4; i++) {
      const y1 = 116 + i * 11;
      const x2 = 128 + s * (24 + 50);
      const y2 = y1 + (i - 1.5) * 26;
      c.beginPath();
      c.moveTo(128 + s * 14, y1);
      c.quadraticCurveTo(128 + s * 46, y1 - 10, x2, y2);
      c.stroke();
    }
  }
  return new THREE.CanvasTexture(cnv);
}

function makeSpiderHero() {
  const g = new THREE.Group();

  const webRed  = makeWebPatternTexture('#d12626', 'rgba(0,0,0,0.30)');
  const webBlue = makeWebPatternTexture('#1d49b8', 'rgba(0,0,0,0.42)');
  const redMat   = new THREE.MeshStandardMaterial({ map: webRed,  roughness: 0.55 });
  const blueMat  = new THREE.MeshStandardMaterial({ map: webBlue, roughness: 0.55 });
  const gloveMat = new THREE.MeshStandardMaterial({ color: 0xb01818, roughness: 0.45 }); // gloves+boots (red)
  const eyeMat   = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const eyeRim   = new THREE.MeshBasicMaterial({ color: 0x0a0a0a });

  // ===== LEGS: blue thigh + KNEE joint + tall red boot (animated stride) =====
  function makeLeg(side) {
    const leg = new THREE.Group();                       // pivots at the hip
    const thigh = new THREE.Mesh(new THREE.CapsuleGeometry(0.19, 0.55, 6, 10), blueMat);
    thigh.position.y = -0.34; leg.add(thigh);
    const knee = new THREE.Group(); knee.position.y = -0.66; leg.add(knee);  // pivots at the knee
    const boot = new THREE.Mesh(new THREE.CapsuleGeometry(0.16, 0.42, 6, 10), gloveMat);
    boot.position.y = -0.3; knee.add(boot);
    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.18, 0.56), gloveMat);
    foot.position.set(0, -0.6, 0.12); knee.add(foot);
    leg.position.set(side * 0.24, 1.5, 0);
    leg.userData.knee = knee;
    return leg;
  }
  heroLegL = makeLeg(-1); heroLegR = makeLeg(1);
  g.add(heroLegL); g.add(heroLegR);

  // ===== PELVIS (blue) =====
  const pelvis = new THREE.Mesh(new THREE.CapsuleGeometry(0.32, 0.18, 6, 12), blueMat);
  pelvis.position.y = 1.52; pelvis.scale.set(1, 1, 0.8); g.add(pelvis);

  // ===== UPPER BODY (leans forward; animated twist) =====
  const upper = new THREE.Group();
  upper.position.y = 1.5; upper.rotation.x = -0.22;
  g.add(upper);
  heroUpper = upper;

  heroTorso = new THREE.Mesh(new THREE.CapsuleGeometry(0.38, 0.7, 8, 16), redMat);
  heroTorso.position.y = 0.5; heroTorso.scale.set(1.1, 1, 0.72);
  upper.add(heroTorso);

  // bold black spider on the BACK (the side facing the camera)
  const emblem = new THREE.Mesh(
    new THREE.PlaneGeometry(0.6, 0.8),
    new THREE.MeshBasicMaterial({ map: makeSpiderEmblemTexture(), transparent: true })
  );
  emblem.position.set(0, 0.55, 0.3); upper.add(emblem);

  // shoulders (red)
  for (const s of [-1, 1]) {
    const delt = new THREE.Mesh(new THREE.SphereGeometry(0.2, 10, 10), redMat);
    delt.position.set(s * 0.4, 0.85, 0); upper.add(delt);
  }

  // ===== HEAD / MASK (red, with eyes wrapping to the sides) =====
  heroHead = new THREE.Mesh(new THREE.SphereGeometry(0.32, 18, 18), redMat);
  heroHead.position.y = 1.22; heroHead.scale.set(0.95, 1.05, 1);
  upper.add(heroHead);
  for (const s of [-1, 1]) {
    const eye = new THREE.Mesh(new THREE.PlaneGeometry(0.2, 0.13), eyeMat);
    eye.position.set(s * 0.17, 1.24, -0.26);
    eye.rotation.set(0.1, Math.PI + s * 0.5, -s * 0.2);
    upper.add(eye);
    const rim = new THREE.Mesh(new THREE.PlaneGeometry(0.25, 0.18), eyeRim);
    rim.position.set(s * 0.17, 1.24, -0.265);
    rim.rotation.copy(eye.rotation);
    upper.add(rim);
  }

  // ===== ARMS: blue upper + ELBOW joint + red glove, hanging to pump =====
  function makeArm(side) {
    const arm = new THREE.Group();                       // pivots at the shoulder
    const upperArm = new THREE.Mesh(new THREE.CapsuleGeometry(0.14, 0.42, 6, 10), blueMat);
    upperArm.position.y = -0.26; arm.add(upperArm);
    const elbow = new THREE.Group(); elbow.position.y = -0.5; elbow.rotation.x = -0.7; arm.add(elbow);
    const foreArm = new THREE.Mesh(new THREE.CapsuleGeometry(0.12, 0.38, 6, 10), blueMat);
    foreArm.position.y = -0.22; elbow.add(foreArm);
    const glove = new THREE.Mesh(new THREE.SphereGeometry(0.15, 10, 10), gloveMat);
    glove.position.y = -0.46; elbow.add(glove);
    arm.position.set(side * 0.4, 0.85, 0);
    arm.rotation.z = -side * 0.1;
    arm.userData.elbow = elbow;
    return arm;
  }
  heroArmL = makeArm(-1); heroArmR = makeArm(1);
  upper.add(heroArmL); upper.add(heroArmR);

  return g;
}

// ── Hero swing cycle — pendulum arc hanging from a visible web ──
let swingPhase = 0;
const SWING_SWAY   = 0.9;   // how far he drifts side-to-side within the lane (subtle)
const SWING_LIFT   = 0.7;   // how much higher he rises at the arc edges (subtle)
const SWING_BASE_Y = 1.4;   // hang height above the road
function animateHero(dt) {
  if (!heroGroup) return;
  const playing = state === 'PLAYING' && !hero.dead;
  const rate = playing ? 2.0 + speed * 0.03 : 1.3;   // swing tempo (faster when faster)
  const amp  = playing ? 1 : 0.6;
  if (!hero.dead) swingPhase += dt * rate;
  const s = Math.sin(swingPhase);          // -1..1 across the arc

  // body: sway within the lane, rise at the edges (lowest in the middle), roll into the swing
  const laneKick = hero.swinging
    ? ((hero.swingTo > hero.swingFrom ? 1 : -1) * 0.25 * Math.sin(Math.PI * hero.swingT))
    : 0;
  heroGroup.position.x += s * SWING_SWAY * amp;            // (updateCamera set base x = camCurrentX)
  heroGroup.position.y  = SWING_BASE_Y + s * s * SWING_LIFT * amp;
  heroGroup.rotation.z  = -s * 0.26 * amp - laneKick;

  // pose: arms reach up to the web, legs tuck & trail (a little life from the arc)
  if (heroArmL) { heroArmL.rotation.x = -2.5 + s * 0.15; if (heroArmL.userData.elbow) heroArmL.userData.elbow.rotation.x = -0.25; }
  if (heroArmR) { heroArmR.rotation.x = -2.5 - s * 0.15; if (heroArmR.userData.elbow) heroArmR.userData.elbow.rotation.x = -0.25; }
  if (heroLegL) { heroLegL.rotation.x = 0.5 + s * 0.2;  if (heroLegL.userData.knee) heroLegL.userData.knee.rotation.x = 0.7; }
  if (heroLegR) { heroLegR.rotation.x = 0.4 - s * 0.2;  if (heroLegR.userData.knee) heroLegR.userData.knee.rotation.x = 0.8; }
  if (heroUpper) heroUpper.rotation.y = s * 0.08 * amp;

  // visible web: from his hands up to an anchor high, forward, and to the swing side
  if (webLine) {
    webLine.visible = true;
    const handY = heroGroup.position.y + 3.3;
    _webStart.set(heroGroup.position.x, handY, 0);
    _webEnd.set(camCurrentX - s * 3, handY + 16, -12);    // off-screen up & to the side (phantom anchor)
    _webMid.copy(_webStart).add(_webEnd).multiplyScalar(0.5);
    webLine.position.copy(_webMid);
    webLine.scale.set(1, _webStart.distanceTo(_webEnd), 1);
    _webDir.copy(_webEnd).sub(_webStart).normalize();
    webLine.quaternion.setFromUnitVectors(_UP, _webDir);
  }
}

// reusable vectors so we don't allocate every frame
const _webStart = new THREE.Vector3();
const _webEnd   = new THREE.Vector3();
const _webMid   = new THREE.Vector3();
const _webDir   = new THREE.Vector3();
const _UP       = new THREE.Vector3(0, 1, 0);

function makeWeb() {
  // a unit-height strand we stretch + aim each frame (hand -> anchor ahead)
  const cylGeom = new THREE.CylinderGeometry(0.05, 0.05, 1, 6);
  const cylMat  = new THREE.MeshBasicMaterial({ color: 0xfff5d0 });
  webLine = new THREE.Mesh(cylGeom, cylMat);

}

// ── Obstacles in lanes ───────────────────────────────────────
const OBSTACLE_TYPES = ['barricade', 'billboard', 'cranebar', 'truck', 'bomb', 'vulture', 'car'];

function spawnObstacle() {
  const lane = Math.floor(Math.random() * 3);
  const type = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
  let mesh;
  if (type === 'barricade') mesh = makeBarricade();
  else if (type === 'billboard') mesh = makeBillboard();
  else if (type === 'cranebar') mesh = makeCraneBar();
  else if (type === 'truck') mesh = makeTruck();
  else if (type === 'bomb') mesh = makeGoblinBomb();
  else if (type === 'vulture') mesh = makeVulture();
  else mesh = makeCarObstacle();
  mesh.position.set(LANE_X[lane], 0, SPAWN_Z);
  scene.add(mesh);
  obstacles.push({ mesh, lane, type, hit: false });
}

// red/white hazard stripes for the barricade panel
function makeChevronTexture() {
  const cnv = document.createElement('canvas');
  cnv.width = cnv.height = 128;
  const c = cnv.getContext('2d');
  c.fillStyle = '#e23b3b'; c.fillRect(0, 0, 128, 128);     // red base
  c.fillStyle = '#f4f4f4';                                  // white diagonal hazard stripes
  const sw = 24;
  for (let x = -128; x < 256; x += sw * 2) {
    c.beginPath();
    c.moveTo(x, 0); c.lineTo(x + sw, 0);
    c.lineTo(x + sw - 128, 128); c.lineTo(x - 128, 128);
    c.closePath(); c.fill();
  }
  return new THREE.CanvasTexture(cnv);
}

// comic poster for the billboard face — bold bg, halftone, big spider graphic
function makeBillboardTexture() {
  const cnv = document.createElement('canvas');
  cnv.width = 256; cnv.height = 160;
  const c = cnv.getContext('2d');
  const palettes = [['#ffd23f','#c0392b'], ['#3b7bff','#fff0a0'], ['#2ec27e','#0a3d2a'], ['#ff4d6d','#2b2d42']];
  const [bg, ink] = palettes[Math.floor(Math.random() * palettes.length)];
  c.fillStyle = bg; c.fillRect(0, 0, 256, 160);
  c.fillStyle = 'rgba(0,0,0,0.10)';                       // halftone wash
  for (let y = 8; y < 160; y += 16) for (let x = 8; x < 256; x += 16) { c.beginPath(); c.arc(x, y, 3, 0, Math.PI*2); c.fill(); }
  c.strokeStyle = ink; c.lineWidth = 12; c.strokeRect(7, 7, 242, 146);   // bold border
  c.fillStyle = ink;                                       // spider body
  c.beginPath(); c.ellipse(128, 94, 16, 30, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(128, 58, 12, 13, 0, 0, Math.PI*2); c.fill();
  c.strokeStyle = ink; c.lineWidth = 6; c.lineCap = 'round';            // legs
  for (const s of [-1, 1]) for (let i = 0; i < 3; i++) {
    const y1 = 66 + i * 13;
    c.beginPath(); c.moveTo(128 + s*12, y1);
    c.quadraticCurveTo(128 + s*40, y1 - 8, 128 + s*64, y1 + (i - 1) * 18); c.stroke();
  }
  return new THREE.CanvasTexture(cnv);
}

function spawnCoinArc() {
  // a short straight row of coins in one lane at a steady height

  const n = 5;
  for (let i = 0; i < n; i++) {

function updateCoins(dt) {
  for (let i = coins.length - 1; i >= 0; i--) {
    const c = coins[i];
    c.mesh.position.z += speed * dt;
    c.mesh.rotation.y += dt * 5;     // spin for shine
    if (!c.got && !hero.dead && c.lane === hero.lane &&
        c.mesh.position.z > HIT_Z - 3 && c.mesh.position.z < HIT_Z + 5) {
      c.got = true;
      score += 10;
      coinCount++;
      sfxCoin();
      floatText('+1', 0, '#ffd23f');
      scene.remove(c.mesh);
      coins.splice(i, 1);
      continue;
    }
    if (c.mesh.position.z > 30) { scene.remove(c.mesh); coins.splice(i, 1); }
  }
}

// ── Camera ───────────────────────────────────────────────────
const CAM_BASE = new THREE.Vector3(0, 7.5, 7);
const CAM_LOOK = new THREE.Vector3(0, 2, -20);   // back to the previous angle
let camCurrentX = 0;

function updateCamera(dt) {
  let targetX;
  if (hero.swinging) {
    targetX = LANE_X[hero.swingFrom] + (LANE_X[hero.swingTo] - LANE_X[hero.swingFrom]) * hero.swingT;
  } else {
    targetX = LANE_X[hero.lane];
  }
  camCurrentX += (targetX - camCurrentX) * 0.22;

  let targetTilt;
  if (hero.swinging) {
    const t = hero.swingT;
    const fromT = LANE_TILT[hero.swingFrom], toT = LANE_TILT[hero.swingTo];
    const lerp  = fromT + (toT - fromT) * t;
    const peak  = (toT - fromT) * 1.4 * Math.sin(Math.PI * t);
    targetTilt = lerp + peak * 0.3;
  } else {
    targetTilt = LANE_TILT[hero.lane];
  }
  camTilt += (targetTilt - camTilt) * 0.2;

  const sx = camShake > 0 ? (Math.random() - 0.5) * camShake : 0;
  const sy = camShake > 0 ? (Math.random() - 0.5) * camShake : 0;
  if (camShake > 0) camShake = Math.max(0, camShake - dt * 35);

  camera.position.set(camCurrentX + sx, CAM_BASE.y + sy, CAM_BASE.z);
  heroGroup.position.x = camCurrentX;        // lane base; animateHero adds the swing sway/bob
  heroGroup.position.z = 0;
  // (hero y, roll, pose, and the web are all handled in animateHero)

  const lookTarget = new THREE.Vector3(camCurrentX, CAM_LOOK.y, CAM_LOOK.z);
  camera.lookAt(lookTarget);
  camera.rotateZ(camTilt);
}

// ── Recycle world objects ────────────────────────────────────
function recycleWorld() {
  const dz = speed * (lastTSDelta || 0.016);
  for (const b of backgroundBldgs) {
    b.mesh.position.z += dz;
    if (b.mesh.position.z > 30) {
      b.mesh.position.z -= 1200;
    }
  }
  for (const t of trees) {
    t.mesh.position.z += dz;
    if (t.mesh.position.z > 20) t.mesh.position.z -= 800;
  }
  for (const c of cars) {
    c.mesh.position.z += dz;
    if (c.mesh.position.z > 20) c.mesh.position.z -= 600;
  }
}

let lastTSDelta = 0.016;

// ── Obstacle updates ─────────────────────────────────────────
function updateObstacles(dt) {
  for (const o of obstacles) {
    o.mesh.position.z += speed * dt;
    if (!o.hit && !hero.dead) {
      if (o.mesh.position.z > OBS_HIT_NEAR && o.mesh.position.z < OBS_HIT_FAR && o.lane === hero.lane) {
        o.hit = true; triggerDeath();
      }
    }
  }
  for (let i = obstacles.length - 1; i >= 0; i--) {
    if (obstacles[i].mesh.position.z > 30) {
      scene.remove(obstacles[i].mesh);
      obstacles.splice(i, 1);
    }
  }
}

// ── Input ────────────────────────────────────────────────────
// Lane changes fire the INSTANT a swipe crosses SWIPE_THRESH (on touchmove),
// not on finger-lift — keeps a fast dodge game feeling responsive.
const SWIPE_THRESH = 28;       // px of horizontal travel before a swipe counts
let t0x = 0, t0y = 0;
let swipeArmed = false;        // one lane-change per touch; lift & swipe again for more

webglCanvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio(); resumeAudio();    // unlock audio on first touch (iOS rule)
  t0x = e.touches[0].clientX; t0y = e.touches[0].clientY;
  swipeArmed = true;
}, { passive: false });

webglCanvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (state !== 'PLAYING' || hero.dead || !swipeArmed) return;
  const dx = e.touches[0].clientX - t0x;
  if (Math.abs(dx) > SWIPE_THRESH) {
    doSwipe(dx < 0 ? 'left' : 'right');
    swipeArmed = false;        // consumed — must lift to swipe again
  }
}, { passive: false });

webglCanvas.addEventListener('touchend', e => {
  e.preventDefault();
  const tx = e.changedTouches[0].clientX, ty = e.changedTouches[0].clientY;
  const dx = tx - t0x, dy = ty - t0y;
  // In-game swipes already fired on touchmove; touchend only drives the menus.
  if (state !== 'PLAYING') handleInput(tx, ty, dx, dy);
  swipeArmed = false;
}, { passive: false });

// desktop click = a tap (drives all the menu/art screens; gameplay uses arrow keys)
webglCanvas.addEventListener('mousedown', e => {
  initAudio(); resumeAudio();
  if (state !== 'PLAYING') handleInput(e.clientX, e.clientY, 0, 0);
});

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  handleInput(0, 0, -80, 0);
  if (e.key === 'ArrowRight') handleInput(0, 0,  80, 0);
  if (e.key === ' ' || e.key === 'Enter') handleInput(W/2, H/2, 0, 0);
});

function handleInput(tx, ty, dx, dy) {
  if (state === 'SPLASH') {
    const b = titleButtons();
    if (pointInRect(tx, ty, b.play)) startGame();
    else if (pointInRect(tx, ty, b.draw)) goArt();
    return;
  }
  if (state === 'ART') {
    if (artFlashing) { artFlashing = false; }            // lock the flashing pose
    else {
      const b = artButtons();
      if (pointInRect(tx, ty, b.shuffle)) { artFlashing = true; artFlashT = 0; }
      else if (pointInRect(tx, ty, b.back)) goTitle();
    }
    return;
  }
  if (state === 'DEAD' && hero.deadT > 0.7) {
    if (isHighScore(Math.floor(score))) goInitials();   // earned a spot → enter initials
    else goScores();                                     // otherwise just view the board
    return;
  }
  if (state === 'INITIALS') { handleInitialsInput(tx, ty, dx, dy); return; }
  if (state === 'SCORES')   { if (scoresAnimT > 0.5) goTitle(); return; }   // back to the menu hub
  if (state !== 'PLAYING' || hero.dead) return;
  if (Math.abs(dx) > 30) doSwipe(dx < 0 ? 'left' : 'right');
}

function doSwipe(dir) {
  if (hero.swinging) { pendingSwipe = dir; return; }
  const next = hero.lane + (dir === 'left' ? -1 : 1);
  if (next < 0 || next > 2) return;
  hero.swinging = true; hero.swingT = 0;
  hero.swingFrom = hero.lane; hero.swingTo = next;
  camShake = Math.max(camShake, 0.15);
  floatText('THWIP!', dir === 'left' ? -1 : 1, '#ffe000');
  sfxThwip();
}

function updateSwing(dt) {
  if (!hero.swinging) return;
  hero.swingT += dt / (SWING_MS / 1000);
  if (hero.swingT >= 1) {
    hero.lane = hero.swingTo;
    hero.swinging = false;
    if (pendingSwipe) { const q = pendingSwipe; pendingSwipe = null; doSwipe(q); }
  }
}

// ── Effects & death ──────────────────────────────────────────
function triggerDeath() {
  hero.dead = true;
  state = 'DEAD';
  camShake = 0.7;
  sfxCrash(); stopBeat();
  floatText('CRASH!', 0, '#ff2200');
  for (let i = 0; i < 30; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = 5 + Math.random() * 8;
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(0.15 + Math.random() * 0.2, 6, 6),
      new THREE.MeshBasicMaterial({ color: [0xcc1818, 0x1944a8, 0xffe000][i % 3] })
    );
    m.position.copy(heroGroup.position);
    m.position.y += 2 + Math.random() * 2;
    particles3D.push({ mesh: m, vx: Math.cos(a) * v, vy: Math.sin(a) * v + 3, vz: (Math.random() - 0.5) * 4, life: 1 });
    scene.add(m);
  }
}

function updateParticles3D(dt) {
  for (let i = particles3D.length - 1; i >= 0; i--) {
    const p = particles3D[i];
    p.mesh.position.x += p.vx * dt;
    p.mesh.position.y += p.vy * dt;
    p.mesh.position.z += p.vz * dt;
    p.vy -= 18 * dt;
    p.life -= dt * 0.8;
    p.mesh.scale.setScalar(Math.max(0.05, p.life));
    if (p.life <= 0) {
      scene.remove(p.mesh);
      particles3D.splice(i, 1);
    }
  }
}

function floatText(text, xDir, color) {
  const cx = W / 2, cy = H * 0.45;
  floaters.push({
    text, x: cx + xDir * 110, y: cy,
    alpha: 1, vy: -2,
    size: text === 'CRASH!' || text === 'WHAM!' ? 68 : 38,
    color: color || '#ffdd00',
    rot: xDir * 0.18,
  });
}

function updateFloaters(dt) {
  floaters.forEach(f => { f.y += f.vy; f.alpha -= dt * 1.6; });
  floaters = floaters.filter(f => f.alpha > 0);
}

function drawFloatersUI() {
  floaters.forEach(f => {
    uiCtx.save(); uiCtx.globalAlpha = f.alpha;
    uiCtx.translate(f.x, f.y); uiCtx.rotate(f.rot);
    uiCtx.font = `bold ${f.size}px "Bangers", "Arial Black", Arial`;
    uiCtx.textAlign = 'center';
    uiCtx.strokeStyle = '#000'; uiCtx.lineWidth = 7;
    uiCtx.strokeText(f.text, 0, 0);
    uiCtx.fillStyle = f.color; uiCtx.fillText(f.text, 0, 0);
    uiCtx.restore();
  });
}

// ── Comic-book overlay FX (pure 2D, layered over the 3D) ─────
let halftoneTile = null, vignetteCanvas = null;
function getHalftone() {
  if (halftoneTile) return halftoneTile;
  halftoneTile = document.createElement('canvas');
  halftoneTile.width = halftoneTile.height = 14;
  const x = halftoneTile.getContext('2d');
  x.clearRect(0, 0, 14, 14);
  x.fillStyle = '#000';
  x.beginPath(); x.arc(7, 7, 3, 0, Math.PI * 2); x.fill();
  return halftoneTile;
}
// pre-render halftone dots that shade only the screen EDGES (comic depth)
function buildVignette() {
  vignetteCanvas = document.createElement('canvas');
  vignetteCanvas.width = W; vignetteCanvas.height = H;
  const x = vignetteCanvas.getContext('2d');
  x.fillStyle = x.createPattern(getHalftone(), 'repeat');
  x.fillRect(0, 0, W, H);
  const r = Math.max(W, H) * 0.6;
  const g = x.createRadialGradient(W/2, H/2, r * 0.4, W/2, H/2, r);
  g.addColorStop(0, 'rgba(0,0,0,1)');   // erase the middle...
  g.addColorStop(1, 'rgba(0,0,0,0)');   // ...keep dots near the edge
  x.globalCompositeOperation = 'destination-out';
  x.fillStyle = g; x.fillRect(0, 0, W, H);
}
function drawComicTexture(alpha) {
  if (!vignetteCanvas) return;
  uiCtx.globalAlpha = alpha;
  uiCtx.drawImage(vignetteCanvas, 0, 0);
  uiCtx.globalAlpha = 1;
}
// radial motion streaks rushing inward — stronger the faster you go
function drawSpeedLines(strength) {
  const cx = W / 2, cy = H * 0.5, n = 30;
  const rOut = Math.max(W, H) * 0.78;
  uiCtx.save(); uiCtx.lineCap = 'round';
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2 + (i % 2 ? 0.05 : 0);
    const rIn = rOut * (0.55 - (i % 3) * 0.05) - strength * 60;
    uiCtx.globalAlpha = (0.06 + 0.22 * strength) * (i % 2 ? 1 : 0.55);
    uiCtx.strokeStyle = (i % 4 === 0) ? '#000' : '#fff';
    uiCtx.lineWidth = (i % 3 === 0) ? 3.5 : 1.5;
    uiCtx.beginPath();
    uiCtx.moveTo(cx + Math.cos(a) * rOut, cy + Math.sin(a) * rOut);
    uiCtx.lineTo(cx + Math.cos(a) * rIn,  cy + Math.sin(a) * rIn);
    uiCtx.stroke();
  }
  uiCtx.restore(); uiCtx.globalAlpha = 1;
}
// bold black border = comic-panel gutter
function drawComicFrame() {
  const lw = Math.max(6, W * 0.013);
  uiCtx.save();
  uiCtx.strokeStyle = '#0a0a0a'; uiCtx.lineWidth = lw;
  uiCtx.strokeRect(lw / 2, lw / 2, W - lw, H - lw);
  uiCtx.restore();
}

// ════════ Spider-hero pose art (original, comic-filled) ════════
function _limb(c, ax, ay, bx, by, w, fill) {
  c.lineCap = 'round';
  c.strokeStyle = '#0a0a0a'; c.lineWidth = w + 6;
  c.beginPath(); c.moveTo(ax, ay); c.lineTo(bx, by); c.stroke();
  c.strokeStyle = fill; c.lineWidth = w;
  c.beginPath(); c.moveTo(ax, ay); c.lineTo(bx, by); c.stroke();
}
function _blob(c, x, y, r, fill) {
  c.beginPath(); c.arc(x, y, r, 0, Math.PI * 2);
  c.fillStyle = fill; c.fill();
  c.lineWidth = Math.max(3, r * 0.5); c.strokeStyle = '#0a0a0a'; c.stroke();
}
// spider-web net (spokes + concentric rings) radiating from (ox,oy) — clip first
function _webNet(c, ox, oy, R, rings, spokes) {
  c.strokeStyle = 'rgba(0,0,0,0.5)'; c.lineWidth = Math.max(0.8, R * 0.022);
  for (let i = 0; i < spokes; i++) {
    const a = (i / spokes) * Math.PI * 2;
    c.beginPath(); c.moveTo(ox, oy); c.lineTo(ox + Math.cos(a) * R, oy + Math.sin(a) * R); c.stroke();
  }
  for (let r = 1; r <= rings; r++) {
    const rr = R * (r / rings);
    c.beginPath();
    for (let i = 0; i <= spokes; i++) {
      const a = (i / spokes) * Math.PI * 2;
      const x = ox + Math.cos(a) * rr, y = oy + Math.sin(a) * rr;
      if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
    }
    c.closePath(); c.stroke();
  }
}
// web hatching along a limb (a center line + rungs across it)
function _limbWeb(c, ax, ay, bx, by, w) {
  const dx = bx - ax, dy = by - ay, len = Math.hypot(dx, dy);
  if (len < 2) return;
  const px = -dy / len, py = dx / len;
  c.strokeStyle = 'rgba(0,0,0,0.38)'; c.lineWidth = Math.max(0.7, w * 0.08);
  c.beginPath(); c.moveTo(ax, ay); c.lineTo(bx, by); c.stroke();
  const n = Math.max(2, Math.floor(len / (w * 0.85)));
  for (let i = 1; i < n; i++) {
    const t = i / n, x = ax + dx * t, y = ay + dy * t;
    c.beginPath();
    c.moveTo(x - px * w * 0.45, y - py * w * 0.45);
    c.lineTo(x + px * w * 0.45, y + py * w * 0.45); c.stroke();
  }
}
function _mask(c, x, y, r) {
  c.save(); c.translate(x, y);
  c.save();
  c.beginPath(); c.arc(0, 0, r, 0, Math.PI * 2);
  c.fillStyle = '#d12626'; c.fill();
  c.lineWidth = Math.max(3, r * 0.16); c.strokeStyle = '#0a0a0a'; c.stroke();
  c.clip();
  _webNet(c, 0, -r * 0.25, r * 1.5, 3, 9);           // spider-web mask pattern
  c.restore();
  for (const s of [-1, 1]) {                          // big bordered spider eyes
    c.save(); c.translate(s * r * 0.4, -r * 0.02); c.rotate(s * 0.55);
    c.beginPath(); c.ellipse(0, 0, r * 0.5, r * 0.3, 0, 0, Math.PI * 2);
    c.fillStyle = '#fff'; c.fill();
    c.lineWidth = Math.max(3, r * 0.14); c.strokeStyle = '#0a0a0a'; c.stroke();
    c.restore();
  }
  c.restore();
}
function drawSpiderPose(c, cx, cy, s, P) {
  const X = j => cx + j[0] * s, Y = j => cy + j[1] * s;
  const RED = '#d12626', BLUE = '#1d49b8', GLOVE = '#9c1414';
  const armW = s * 0.15, legW = s * 0.2;
  const tcx = (X(P.shL) + X(P.shR) + X(P.hipL) + X(P.hipR)) / 4;   // torso center
  const tcy = (Y(P.shL) + Y(P.shR) + Y(P.hipL) + Y(P.hipR)) / 4;

  // legs (blue) behind + web hatching
  _limb(c, X(P.hipL), Y(P.hipL), X(P.kneeL), Y(P.kneeL), legW, BLUE);
  _limb(c, X(P.kneeL), Y(P.kneeL), X(P.footL), Y(P.footL), legW * 0.9, BLUE);
  _limb(c, X(P.hipR), Y(P.hipR), X(P.kneeR), Y(P.kneeR), legW, BLUE);
  _limb(c, X(P.kneeR), Y(P.kneeR), X(P.footR), Y(P.footR), legW * 0.9, BLUE);
  _limbWeb(c, X(P.hipL), Y(P.hipL), X(P.kneeL), Y(P.kneeL), legW);
  _limbWeb(c, X(P.kneeL), Y(P.kneeL), X(P.footL), Y(P.footL), legW * 0.9);
  _limbWeb(c, X(P.hipR), Y(P.hipR), X(P.kneeR), Y(P.kneeR), legW);
  _limbWeb(c, X(P.kneeR), Y(P.kneeR), X(P.footR), Y(P.footR), legW * 0.9);
  _blob(c, X(P.footL), Y(P.footL), s * 0.13, GLOVE);
  _blob(c, X(P.footR), Y(P.footR), s * 0.13, GLOVE);

  // neck + filled tapered torso with a clipped web net
  _limb(c, X(P.head), Y(P.head), tcx, tcy, s * 0.17, RED);
  c.save();
  c.beginPath();
  c.moveTo(X(P.shL), Y(P.shL)); c.lineTo(X(P.shR), Y(P.shR));
  c.lineTo(X(P.hipR), Y(P.hipR)); c.lineTo(X(P.hipL), Y(P.hipL));
  c.closePath(); c.lineJoin = 'round';
  c.fillStyle = RED; c.fill();
  c.lineWidth = s * 0.1; c.strokeStyle = '#0a0a0a'; c.stroke();
  c.clip();
  _webNet(c, tcx, tcy, s * 0.85, 3, 9);
  c.restore();

  // arms (red) over the torso + web hatching
  _limb(c, X(P.shL), Y(P.shL), X(P.elL), Y(P.elL), armW, RED);
  _limb(c, X(P.elL), Y(P.elL), X(P.haL), Y(P.haL), armW * 0.9, RED);
  _limb(c, X(P.shR), Y(P.shR), X(P.elR), Y(P.elR), armW, RED);
  _limb(c, X(P.elR), Y(P.elR), X(P.haR), Y(P.haR), armW * 0.9, RED);
  _limbWeb(c, X(P.shL), Y(P.shL), X(P.elL), Y(P.elL), armW);
  _limbWeb(c, X(P.elL), Y(P.elL), X(P.haL), Y(P.haL), armW * 0.9);
  _limbWeb(c, X(P.shR), Y(P.shR), X(P.elR), Y(P.elR), armW);
  _limbWeb(c, X(P.elR), Y(P.elR), X(P.haR), Y(P.haR), armW * 0.9);
  _blob(c, X(P.haL), Y(P.haL), s * 0.1, GLOVE);
  _blob(c, X(P.haR), Y(P.haR), s * 0.1, GLOVE);

  // chest spider emblem (abdomen + thorax) on top of the web
  c.fillStyle = '#0a0a0a';
  c.beginPath(); c.ellipse(tcx, tcy + s * 0.02, s * 0.055, s * 0.11, 0, 0, Math.PI * 2); c.fill();
  c.beginPath(); c.ellipse(tcx, tcy - s * 0.12, s * 0.04, s * 0.05, 0, 0, Math.PI * 2); c.fill();

  _mask(c, X(P.head), Y(P.head), s * 0.2);
}

function roundRect(x, y, w, h, r) {
  uiCtx.beginPath();
  uiCtx.moveTo(x + r, y); uiCtx.lineTo(x + w - r, y); uiCtx.arcTo(x + w, y, x + w, y + r, r);
  uiCtx.lineTo(x + w, y + h - r); uiCtx.arcTo(x + w, y + h, x + w - r, y + h, r);
  uiCtx.lineTo(x + r, y + h); uiCtx.arcTo(x, y + h, x, y + h - r, r);
  uiCtx.lineTo(x, y + r); uiCtx.arcTo(x, y, x + r, y, r);
  uiCtx.closePath();
}

  newScoreIndex = -1; scoresAnimT = 0;

  particles3D = [];
  floaters = [];

  Object.assign(hero, { lane:1, swinging:false, swingFrom:1, swingTo:1, swingT:0, dead:false, deadT:0 });

// did this run earn a top-5 spot?
function isHighScore(s) {
  return s > 0 && (hiScores.length < 5 || s > hiScores[hiScores.length - 1].score);
}

// view the board read-only (no new entry, no initials prompt)
function goScores() {
  newScoreIndex = -1;
  scoresAnimT = 0;
  state = 'SCORES';
}

function goInitials() {
  initials.typed = '';
  initials.score = Math.floor(score);
  state = 'INITIALS';
  initialsInput.value = '';
  initialsInput.style.pointerEvents = 'auto';
  initialsInput.focus();
}

function saveInitials() {
  const ini = (initials.typed || 'BRX').padEnd(3, 'X').slice(0, 3);
  const entry = { score: initials.score, initials: ini };
  hiScores.push(entry);
  hiScores.sort((a, b) => b.score - a.score);
  hiScores = hiScores.slice(0, 5);
  newScoreIndex = hiScores.indexOf(entry);   // row to highlight + fade in
  scoresAnimT = 0;
  try { localStorage.setItem('bronx-bday-scores', JSON.stringify(hiScores)); } catch(e) {}
  initialsInput.blur();
  initialsInput.style.pointerEvents = 'none';
  state = 'SCORES';
}

// ── Audio (Web Audio API — 100% procedural, no files) ────────
let audioCtx = null, masterGain = null, beatTimer = null, beatStep = 0;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(audioCtx.destination);
  } catch (e) { audioCtx = null; }
}
function resumeAudio() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

// a pitched blip: slides from freqA to freqB over dur seconds
function blip(freqA, freqB, dur, type, vol) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type || 'triangle';
  osc.frequency.setValueAtTime(freqA, t);
  osc.frequency.exponentialRampToValueAtTime(Math.max(1, freqB), t + dur);
  g.gain.setValueAtTime(vol || 0.3, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.connect(g); g.connect(masterGain);
  osc.start(t); osc.stop(t + dur + 0.02);
}

// a burst of filtered white noise (smacks, hi-hats)
function noiseBurst(dur, vol, cutoff) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const n = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < n; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / n);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(vol || 0.4, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = cutoff || 1800;
  src.connect(lp); lp.connect(g); g.connect(masterGain);
  src.start(t); src.stop(t + dur);
}

function sfxThwip() {              // web shot on each swing — very, very subtle
  blip(700, 1250, 0.06, 'sine', 0.02);
}
function sfxCrash() {              // wipeout
  noiseBurst(0.4, 0.5, 2400);
  blip(220, 40, 0.5, 'sawtooth', 0.35);
}
function sfxCoin() {               // bright coin pickup
  blip(900, 1350, 0.07, 'square', 0.11);
  blip(1350, 1800, 0.06, 'square', 0.07);
}

function startBeat() {            // light looping pulse while playing
  if (!audioCtx || beatTimer) return;
  beatStep = 0;
  beatTimer = setInterval(() => {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;
    const kick = audioCtx.createOscillator();
    const kg = audioCtx.createGain();
    kick.frequency.setValueAtTime(150, t);
    kick.frequency.exponentialRampToValueAtTime(48, t + 0.12);
    kg.gain.setValueAtTime(0.17, t);
    kg.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
    kick.connect(kg); kg.connect(masterGain);
    kick.start(t); kick.stop(t + 0.16);
    if (beatStep % 2 === 1) noiseBurst(0.04, 0.05, 8000);   // offbeat hat
    beatStep++;
  }, 280);
}
function stopBeat() {
  if (beatTimer) { clearInterval(beatTimer); beatTimer = null; }
}

  document.fonts.load('40px "Bangers"').catch(() => {});
}

// ── Main loop ────────────────────────────────────────────────
function loop(ts) {
  const dt = Math.min((ts - lastTS) / 1000, 0.05);
  lastTSDelta = dt;
  lastTS = ts; frameN++;

  if (state === 'PLAYING') {
    playTime += dt;
    runDist  += speed * dt;
    score    += speed * dt * 0.5;
    speed     = Math.min(75, 30 + playTime * 0.35);   // start brisker (was 25) so the opening isn't sluggish; same gradual climb

    const interval = Math.max(36, 90 - Math.floor(playTime / 18) * 8);
    if (frameN % interval === 0) spawnObstacle();
    if (frameN % 150 === 75) spawnCoinArc();   // coin runs between hazards

    updateSwing(dt);
    updateObstacles(dt);
    updateCoins(dt);
    recycleWorld();
    updateFloaters(dt);
    updateParticles3D(dt);
  } else if (state === 'DEAD') {
    hero.deadT += dt;
    updateParticles3D(dt);
    updateFloaters(dt);
    speed *= 0.92;
    recycleWorld();
  } else if (state === 'SPLASH' || state === 'INITIALS' || state === 'SCORES' || state === 'ART') {
    speed = 6;
    recycleWorld();
    if (state === 'SCORES') scoresAnimT += dt;   // drive the board fade-in
    if (state === 'ART' && artFlashing) {        // slot-machine pose cycling
      artFlashT += dt;
      if (artFlashT > 0.07) { artFlashT = 0; artIndex = (artIndex + 1) % POSES.length; }
    }
  }

  updateCamera(dt);
  animateHero(dt);
  renderer.render(scene, camera);

  uiCtx.clearRect(0, 0, W, H);
  if (state === 'SPLASH') {
    drawComicTexture(0.5);
    drawSplashUI();
  } else if (state === 'PLAYING' || state === 'DEAD') {
    const rush = Math.max(0, Math.min(1, (speed - 25) / 35));
    drawSpeedLines(rush);
    drawComicTexture(0.5);
    drawComicFrame();
    drawHUD();
    drawFloatersUI();
    if (state === 'DEAD') drawGameOverUI();
  } else if (state === 'INITIALS') {
    drawInitialsUI();
  } else if (state === 'SCORES') {
    drawScoresUI();
  } else if (state === 'ART') {
    drawArtUI();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(ts => { lastTS = ts; requestAnimationFrame(loop); });
</script>
